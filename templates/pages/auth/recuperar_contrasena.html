{% extends 'layout/login_layout.html' %}
{% block title %}Recuperar contraseña — Zenith{% endblock %}
{% block content %}
<h1><i class="bi bi-envelope-fill text-primary"></i> Recuperar</h1>
<p class="subtitulo">Te enviaremos una contraseña temporal al correo registrado.</p>

<form method="POST" action="{{ url_for('auth.recuperar_contrasena') }}" novalidate>
    <div class="mb-3">
        <label for="email" class="form-label">Correo electrónico</label>
        <input type="email" id="email" name="email" class="form-control"
               required autofocus autocomplete="username">
    </div>
    <button type="submit" class="btn btn-primary">
        <i class="bi bi-send"></i> Enviar
    </button>
    <div class="mt-3 text-center">
        <a href="{{ url_for('auth.login') }}">Volver al login</a>
    </div>
</form>
{% endblock %}
