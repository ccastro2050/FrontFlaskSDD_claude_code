{% extends 'layout/login_layout.html' %}
{% block title %}Iniciar sesión — Zenith{% endblock %}
{% block content %}
<h1><i class="bi bi-bar-chart-fill text-primary"></i> Zenith</h1>
<p class="subtitulo">Gestión de ventas</p>

<form method="POST" action="{{ url_for('auth.login') }}" novalidate>
    <div class="mb-3">
        <label for="email" class="form-label">Correo electrónico</label>
        <input type="email" id="email" name="email" class="form-control"
               value="{{ email or '' }}" required autofocus
               autocomplete="username">
    </div>

    <div class="mb-3">
        <label for="contrasena" class="form-label">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena" class="form-control"
               required autocomplete="current-password">
    </div>

    <button type="submit" class="btn btn-primary">
        <i class="bi bi-box-arrow-in-right"></i> Entrar
    </button>

    <div class="mt-3 text-center">
        <a href="{{ url_for('auth.recuperar_contrasena') }}">¿Olvidaste tu contraseña?</a>
    </div>
</form>
{% endblock %}
