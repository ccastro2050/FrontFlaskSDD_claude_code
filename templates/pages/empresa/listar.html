{% extends 'layout/base.html' %}
{% block title %}Empresas — Zenith{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="bi bi-building"></i> Empresas</h1>
    <a href="{{ url_for('empresa.nuevo') }}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Nueva empresa</a>
</div>

{% if items %}
<table class="table table-hover align-middle">
    <thead><tr><th>Código</th><th>Nombre</th><th class="text-end">Acciones</th></tr></thead>
    <tbody>
        {% for e in items %}
        <tr>
            <td>{{ e.codigo }}</td>
            <td>{{ e.nombre }}</td>
            <td class="text-end">
                <a href="{{ url_for('empresa.editar', pk=e.codigo) }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
                <form method="POST" action="{{ url_for('empresa.eliminar', pk=e.codigo) }}"
                      class="d-inline" onsubmit="return confirm('¿Eliminar la empresa {{ e.codigo }}?');">
                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<div class="alert alert-info"><i class="bi bi-info-circle"></i> No hay empresas registradas.</div>
{% endif %}
{% endblock %}
